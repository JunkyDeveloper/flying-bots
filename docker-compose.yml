services:
  steel:
    image: steel:latest
    volumes:
      - ../config:/steel/config
      - ../saves:/steel/saves
    ports:
      - 25565:25565
  east:
    build: .
    image: flying-bot
    command: ["east", "steel", "flying_bot_east"]
    restart: unless-stopped

  west:
    build: .
    image: flying-bot
    command: ["west", "steel", "flying_bot_west"]
    restart: unless-stopped

  south:
    build: .
    image: flying-bot
    command: ["south", "steel", "flying_bot_south"]
    restart: unless-stopped

  north:
    build: .
    image: flying-bot
    command: ["north", "steel", "flying_bot_north"]
    restart: unless-stopped
